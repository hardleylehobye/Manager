<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="dasboard.css">
</head>
<body>

  <!-- Header Section -->
  <header>
    <div id="user-name" class="logo"></div>
    
  </header>

  <div class="container">
    <div class="sidebar" id="sidebar">
      <ul>
        <li><a href="#" id="planner-link-sidebar">Planner</a></li>
        <li><a href="#" id="finances-link-sidebar">Finances</a></li>
        <li><a href="#" id="signout-link-sidebar">Signout</a></li>
      </ul>
    </div>
  
    <main>
      <div id="planner" class="content-section">
        <h2>Planner</h2>
        <p>Manage your daily tasks, schedules, and reminders here.</p>
      </div>
      <div id="finances" class="content-section" style="display: none;">
        <h2>Finances</h2>
        <p>Track your financial goals, budget, and expenses here.</p>
      </div>
      <div id="study" class="content-section" style="display: none;">
        <h2>Study</h2>
        <p>Manage your study plans and assignments here.</p>
      </div>
    </main>
  </div>
  

  <!-- Footer Section -->
  <footer>
    <p>&copy; 2025 My Dashboard. All Rights Reserved.</p>
  </footer>

  <script src="dashboard.js" type="module"></script>
</body>
</html>
